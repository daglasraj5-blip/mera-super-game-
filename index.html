<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Master Project</title>
    <style>
        :root {
            --red: #ff3838; --blue: #17c0eb;
            --green: #32ff7e; --yellow: #fff200;
        }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #2f3542; font-family: sans-serif; }
        
        /* Board Container */
        .ludo-board {
            width: 450px; height: 450px;
            background: white; border: 5px solid #333;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
        }

        /* Houses */
        .house { grid-column: span 6; grid-row: span 6; border: 1px solid #000; position: relative; }
        .red { background: var(--red); }
        .blue { background: var(--blue); }
        .green { background: var(--green); }
        .yellow { background: var(--yellow); }

        /* Internal House Square */
        .inner-box {
            width: 70%; height: 70%; background: white;
            position: absolute; top: 15%; left: 15%;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px;
        }
        .pawn-spot { border-radius: 50%; border: 2px solid #333; }

        /* Path Areas */
        .path { border: 0.1px solid #ddd; }
        .safe { background: #ccc; }

        /* Controls */
        .controls { margin-left: 20px; color: white; text-align: center; }
        #dice-result { font-size: 3rem; margin: 20px 0; background: white; color: black; border-radius: 10px; padding: 10px; }
        button { padding: 10px 25px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 5px; background: var(--green); }
    </style>
</head>
<body>

    <div class="ludo-board">
        <div class="house red" style="grid-area: 1 / 1 / 7 / 7;">
            <div class="inner-box">
                <div class="pawn-spot red"></div><div class="pawn-spot red"></div>
                <div class="pawn-spot red"></div><div class="pawn-spot red"></div>
            </div>
        </div>

        <div class="house green" style="grid-area: 1 / 10 / 7 / 16;">
            <div class="inner-box">
                <div class="pawn-spot green"></div><div class="pawn-spot green"></div>
                <div class="pawn-spot green"></div><div class="pawn-spot green"></div>
            </div>
        </div>

        <div style="grid-area: 7 / 7 / 10 / 10; background: #eee; border: 1px solid #000;"></div>

        <div class="house blue" style="grid-area: 10 / 1 / 16 / 7;">
            <div class="inner-box">
                <div class="pawn-spot blue"></div><div class="pawn-spot blue"></div>
                <div class="pawn-spot blue"></div><div class="pawn-spot blue"></div>
            </div>
        </div>

        <div class="house yellow" style="grid-area: 10 / 10 / 16 / 16;">
            <div class="inner-box">
                <div class="pawn-spot yellow"></div><div class="pawn-spot yellow"></div>
                <div class="pawn-spot yellow"></div><div class="pawn-spot yellow"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <h2>Ludo Master</h2>
        <div id="dice-result">?</div>
        <button onclick="rollDice()">Roll Dice</button>
        <p id="status">Player: Red's Turn</p>
    </div>

    <script>
        function rollDice() {
            const dice = document.getElementById('dice-result');
            const status = document.getElementById('status');
            
            // Dice animation effect
            dice.innerText = "...";
            
            setTimeout(() => {
                const num = Math.floor(Math.random() * 6) + 1;
                dice.innerText = num;
                
                if(num === 6) {
                    status.innerText = "Wow! 6 Aaya. Fir se chalo!";
                } else {
                    status.innerText = "Next Player's Turn";
                }
            }, 300);
        }
    </script>
</body>
</html>
